<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet" style="display:block;" role="img" aria-labelledby="svgtitle svgdesc">
  <!-- Egg. Author: Kirill Ateev. Links: www.kirillateev.art. Date: March 2026. License: CC BY-ND 4.0. -->
 <title id="svgtitle">Egg by Kirill Ateev</title>
  <desc id="svgdesc">Egg: a continuing series of kinetic minimalism works (kinimalism). The original image and metadata are stored fully on-chain, i.e. directly on the Ethereum blockchain forever.</desc>
  <rect width="100" height="100" fill="hsl(51, 100%, 99%)"/>
  <g transform="translate(50 50)">
    <rect x="-50" y="-50" width="100" height="100"
      fill="hsl(51, 100%, 45%)"
      shape-rendering="geometricPrecision"
      transform="scale(0.45)"
    >
      <animateTransform
        attributeName="transform"
        attributeType="XML"
        type="scale"
        values="1;0.6;1"
        keyTimes="0;0.6;1"
        dur="360s"
        repeatCount="indefinite"
        calcMode="spline"
        keySplines="0 0.333 0.667 1;0 0.333 0.667 1"
        additive="sum"
      />
        <animate
          attributeName="fill"
          values="hsl(51, 100%, 45%);hsl(52, 100%, 50%);hsl(51, 100%, 45%)"
          keyTimes="0;0.5;1"
          dur="360s"
          repeatCount="indefinite"
          calcMode="spline"
          keySplines="0.4 0 0.2 1;0.4 0 0.2 1"
        />
    </rect>
  </g>
</svg>